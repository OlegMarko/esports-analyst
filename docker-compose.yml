services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: esports_analyst_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-esports_analyst}
      POSTGRES_USER: ${DB_USERNAME:-esports}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-esports} -d ${DB_DATABASE:-esports_analyst}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
