name: CI

on:
  push:
  pull_request:

jobs:

  tests:
    name: Pest (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: esports
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: esports_analyst_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U esports -d esports_analyst_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5433
          DB_DATABASE: esports_analyst_test
          DB_USERNAME: esports
          DB_PASSWORD: secret

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/pest
